version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker123
      POSTGRES_DB: expenses
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: ./app
    ports:
      - "5002:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://tracker:tracker123@db:5432/expenses
    depends_on:
      - db
    volumes:
      - ./app:/app

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    environment:
      DATABASE_URL: postgresql://tracker:tracker123@db:5432/expenses
    depends_on:
      - db

volumes:
  postgres_data:
